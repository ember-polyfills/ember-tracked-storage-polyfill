name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint:js

  tests:
    name: Tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node:
        - "20"
        - "22"
        - "24"

    steps:
    - uses: actions/checkout@v6
    - uses: pnpm/action-setup@v5
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node }}
        cache: pnpm
    - run: pnpm install
    - run: pnpm test

  legacy-node-tests:
    name: Legacy Node ${{ matrix.node }} Tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node:
        - "12"
        - "14"
    steps:
    - uses: actions/checkout@v6
    - run: cat package.json | jq "del(.packageManager)" | tee package.json
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node }}
        cache: yarn
    - run: yarn install --frozen-lockfile
    - run: yarn test

  floating-dependencies:
    name: Floating Dependencies
    timeout-minutes: 5
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-lockfile
      - run: pnpm test

  try-scenarios:
    name: "Compatibility"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: tests

    strategy:
      fail-fast: true
      matrix:
        ember-try-scenario:
          - ember-lts-3.24
          - ember-release
          - ember-beta
          - ember-canary
          - embroider-safe
          - embroider-optimized
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install
      - run: pnpm ember try:one ${{ matrix.ember-try-scenario }} --skip-cleanup


